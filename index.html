<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | Каталог товаров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="catalog">
    <!-- Хедер с логотипом, поиском и иконками -->
    <header class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-store me-2"></i>ShopExpress
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- Поисковая строка и кнопка в одном контейнере -->
                <div class="d-flex mx-auto w-50">
                    <div class="position-relative w-100">
                        <input class="form-control rounded-pill rounded-end-0" type="search" id="search-input" placeholder="Поиск товаров..." autocomplete="off">
                        <div id="autocomplete-list" class="list-group position-absolute w-100" style="top: 100%; z-index: 1000;"></div>
                    </div>
                    <button class="btn btn-primary rounded-pill rounded-start-0 px-4" id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                
                <!-- Иконки для перехода на корзину и ЛК -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="cart.html" title="Корзина">
                            <i class="fas fa-shopping-cart fs-5 me-1"></i>Корзина
                            <span id="cart-badge" class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle d-none">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html" title="Личный кабинет">
                            <i class="fas fa-user fs-5 me-1"></i>Личный кабинет
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Область для всплывающих уведомлений -->
    <div id="notifications-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <main class="container">
        <div class="row">
            <!-- Сайдбар с формой фильтрации -->
            <aside class="col-lg-3 mb-4">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <h3><i class="fas fa-filter me-2"></i>Фильтры</h3>
                    </div>
                    <div class="sidebar-body">
                        <form id="filter-form">
                            <!-- Категория товара (checkbox) -->
                            <div class="filter-section">
                                <h4>Категории</h4>
                                <div class="categories-list" id="categories-container">
                                    <!-- Категории будут загружены динамически -->
                                    <div class="text-muted small">Загрузка категорий...</div>
                                </div>
                            </div>

                            <!-- Стоимость (от и до) -->
                            <div class="filter-section">
                                <h4>Стоимость (₽)</h4>
                                <div class="price-range">
                                    <input type="number" class="form-control" name="price_min" placeholder="От" min="0" step="1">
                                    <input type="number" class="form-control" name="price_max" placeholder="До" min="0" step="1">
                                </div>
                            </div>

                            <!-- Товары со скидкой -->
                            <div class="filter-section">
                                <div class="discount-checkbox">
                                    <input type="checkbox" name="discount_only" id="discountCheck">
                                    <label for="discountCheck">Товары со скидкой</label>
                                </div>
                            </div>

                            <!-- Кнопка "Применить" -->
                            <div class="filter-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-check me-2"></i>Применить
                                </button>
                                <button type="button" class="btn-outline" id="reset-filters">
                                    <i class="fas fa-undo me-2"></i>Сбросить
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </aside>

            <!-- Блок с каталогом товаров -->
            <section class="col-lg-9">
                <div class="catalog-header">
                    <h2><i class="fas fa-list me-2"></i>Каталог товаров</h2>
                    
                    <!-- Выпадающий список для сортировки -->
                    <select class="form-select" id="sort-select">
                        <option value="default">Сортировка</option>
                        <option value="rating_desc">По рейтингу (убывание)</option>
                        <option value="rating_asc">По рейтингу (возрастание)</option>
                        <option value="price_desc">По цене (убывание)</option>
                        <option value="price_asc">По цене (возрастание)</option>
                    </select>
                </div>

                <!-- Сетка с карточками товаров -->
                <div id="catalog-grid" class="goods-grid">
                    <!-- Товары будут загружены динамически -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Загрузка...</span>
                        </div>
                    </div>
                </div>

                <!-- Кнопка "Загрузить ещё" -->
                <div class="load-more-container">
                    <button id="load-more-btn" class="load-more-btn d-none">
                        <i class="fas fa-sync-alt me-2"></i>Загрузить ещё
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Футер с названием компании и контактами -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <h4><i class="fas fa-store me-2"></i>ShopExpress</h4>
                <p>&copy; 2025 Все права защищены</p>
            </div>
            <div class="footer-contacts">
                <p><i class="fas fa-phone me-2"></i>+7 (495) 123-45-67</p>
                <p><i class="fas fa-envelope me-2"></i>info@shopexpress.ru</p>
                <p><i class="fas fa-map-marker-alt me-2"></i>Москва, ул. Примерная, 10</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
