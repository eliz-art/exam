<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="cart">
    <!-- Хедер с логотипом и иконками -->
    <header class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-store me-2"></i>ShopExpress
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- Иконки для перехода на главную и ЛК -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html" title="Главная">
                            <i class="fas fa-home fs-5 me-1"></i>Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html" title="Личный кабинет">
                            <i class="fas fa-user fs-5 me-1"></i>Личный кабинет
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Область для всплывающих уведомлений -->
    <div id="notifications-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <main class="container">
        <!-- Блок с содержимым корзины -->
        <section class="cart-section">
            <h2><i class="fas fa-shopping-cart me-2"></i>Корзина</h2>
            
            <!-- Сетка с карточками товаров -->
            <div id="cart-items-container" class="cart-items-grid">
                <!-- Товары будут загружены динамически -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Блок с формой оформления заказа -->
        <section class="order-section" id="order-section">
            <div class="order-header">
                <h3><i class="fas fa-clipboard-list me-2"></i>Оформление заказа</h3>
            </div>
            
            <div class="order-body">
                <form id="order-form" class="order-form" novalidate>
                    <!-- Имя -->
                    <div class="form-group">
                        <label for="full_name">
                            <i class="fas fa-user me-1"></i>Имя
                        </label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope me-1"></i>Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <!-- Телефон -->
                    <div class="form-group">
                        <label for="phone">
                            <i class="fas fa-phone me-1"></i>Телефон
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" required>
                    </div>

                    <!-- Адрес доставки -->
                    <div class="form-group">
                        <label for="delivery_address">
                            <i class="fas fa-map-marker-alt me-1"></i>Адрес доставки
                        </label>
                        <input type="text" class="form-control" id="delivery_address" name="delivery_address" required>
                    </div>

                    <!-- Дата доставки -->
                    <div class="form-group">
                        <label for="delivery_date">
                            <i class="fas fa-calendar-alt me-1"></i>Дата доставки
                        </label>
                        <input type="date" class="form-control" id="delivery-date" name="delivery_date" required>
                    </div>

                    <!-- Временной интервал доставки -->
                    <div class="form-group">
                        <label for="delivery_interval">
                            <i class="fas fa-clock me-1"></i>Интервал доставки
                        </label>
                        <select class="form-select" id="delivery-interval" name="delivery_interval" required>
                            <option value="">Выберите интервал</option>
                            <option value="08:00-12:00">08:00 - 12:00</option>
                            <option value="12:00-14:00">12:00 - 14:00</option>
                            <option value="14:00-18:00">14:00 - 18:00</option>
                            <option value="18:00-22:00">18:00 - 22:00</option>
                        </select>
                    </div>

                    <!-- Согласие на получение рассылки (полная ширина) -->
                    <div class="form-group full-width">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="subscribe" name="subscribe">
                            <label class="form-check-label" for="subscribe">
                                <i class="fas fa-envelope-open-text me-1"></i>Согласие на получение рассылки
                            </label>
                        </div>
                    </div>

                    <!-- Комментарий к заказу (полная ширина) -->
                    <div class="form-group full-width">
                        <label for="comment">
                            <i class="fas fa-comment me-1"></i>Комментарий к заказу
                        </label>
                        <textarea class="form-control" id="comment" name="comment" rows="3" placeholder="Ваши пожелания..."></textarea>
                    </div>

                    <!-- Блок с итоговой стоимостью (полная ширина) -->
                    <div class="form-group full-width">
                        <div class="total-section">
                            <div class="total-info">
                                <div class="total-details">
                                    Итого: <span id="final-price">0</span> ₽
                                </div>
                                <div class="delivery-info">
                                    Стоимость доставки: <span id="delivery-cost">200</span> ₽
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Кнопки -->
                    <div class="form-group full-width">
                        <div class="form-actions">
                            <button type="reset" class="btn-secondary">
                                <i class="fas fa-undo me-2"></i>Сбросить
                            </button>
                            <button type="submit" class="btn-success">
                                <i class="fas fa-check me-2"></i>Оформить заказ
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Футер с названием компании и контактами -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <h4><i class="fas fa-store me-2"></i>ShopExpress</h4>
                <p>&copy; 2025 Все права защищены</p>
            </div>
            <div class="footer-contacts">
                <p><i class="fas fa-phone me-2"></i>+7 (495) 123-45-67</p>
                <p><i class="fas fa-envelope me-2"></i>info@shopexpress.ru</p>
                <p><i class="fas fa-map-marker-alt me-2"></i>Москва, ул. Примерная, 10</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
